<!DOCTYPE html>
<html>
<head>
  <title>last visitor</title>
  <style>
    body {
      background-color: #0d0d0d;
      color: #bfbfbf;
      font-family: "Courier New", monospace;
      max-width: 650px;
      margin: 80px auto;
      line-height: 1.8;
    }

    h1 {
      text-align: center;
      font-weight: normal;
      letter-spacing: 3px;
      font-size: 28px;
      margin-bottom: 60px;
    }

    .post {
      margin-bottom: 50px;
    }

    .date {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }

    a {
      color: #888;
      text-decoration: none;
    }

    a:hover {
      color: #ccc;
    }
  </style>
</head>
<body>

  <h1>this page has been visited twice.</h1>

  <div class="post">
    <div class="date">February 26, 2026</div>
    <p>
      I wonder who the first visitor was.
      <br><br>
      If you're reading this, you might be the second.
    </p>
  </div>

</body>
</html>
