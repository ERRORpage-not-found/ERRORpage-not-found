<!DOCTYPE html>
<html>
<head>
  <title>last visitor</title>
  <style>
    body {
      background-color: #0b0b0b;
      color: #bfbfbf;
      font-family: "Courier New", monospace;
      max-width: 650px;
      margin: 80px auto;
      line-height: 1.8;
      text-shadow: 0 0 3px rgba(255,255,255,0.1);
}
    }

    h1 {
      text-align: center;
      font-weight: normal;
      letter-spacing: 3px;
      font-size: 28px;
      margin-bottom: 60px;
    }

    .post {
      margin-bottom: 50px;
    }

    .date {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }

    a {
      color: #888;
      text-decoration: none;
    }

    a:hover {
      color: #ccc;
    }
  </style>
</head>
<body>

  <h1>this page has been visited twice.</h1>

  <div class="post">
    <div class="date">February 26, 2026</div>
    <p>
      I wonder who the first visitor was.
      <br><br>
      If you're reading this, you might be the second.
    </p>
  </div>
<script>
  let hasPlayed = false;

  document.addEventListener("click", function() {
    if (!hasPlayed) {
      hasPlayed = true;

      setTimeout(function() {
        let audio = new Audio("IMG_4495.mp3");
        audio.volume = 0.4;
        audio.play();
      }, 15000); // plays 15 seconds after click
    }
  });
</script>
<script>
  let typed = "";

  document.addEventListener("keydown", function(e) {
    typed += e.key.toLowerCase();

    if (typed.includes("hello")) {
      window.location.href = "hello.html";
    }

    if (typed.length > 20) {
      typed = typed.slice(-20);
    }
  });
</script>
<script>
  setTimeout(function() {
    document.body.style.color = "#777";
  }, 30000); // 30 seconds

  setTimeout(function() {
    let newText = document.createElement("p");
    newText.textContent = "you've been here a while.";
    newText.style.marginTop = "60px";
    newText.style.color = "#555";
    document.body.appendChild(newText);
  }, 45000); // 60 seconds
</script>
<p><a href="missing.html" style="color:#000;">archive</a></p>
<p id="whisper" style="opacity:0; transition: opacity 5s; margin-top:60px;">
  it remembers more than you think.
</p>

<script>
  setTimeout(function() {
    document.getElementById("whisper").style.opacity = "1";
  }, 20000); // 20 seconds
</script>
</body>
</html>
